services:
  web:
    build:
      context: .
      target: runtime
    image: bank-cabinet-web:latest
    container_name: bank-cabinet-web
    restart: unless-stopped
    environment:
      - APP_PASSWORD=295014
    ports:
      - "${WEB_PORT:-3001}:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 3s
      retries: 3

  # run: docker compose --profile dev up
  dev:
    profiles: ["dev"]
    build:
      context: .
      target: dev
    image: bank-cabinet-web:dev
    container_name: bank-cabinet-dev
    ports:
      - "${DEV_PORT:-5173}:5173"
    volumes:
      - .:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0
